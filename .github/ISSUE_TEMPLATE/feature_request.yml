name: Feature request
description: Suggest an improvement to expranno.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow gap
      description: Describe the workflow you are trying to support.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the API, output, or documentation change you would like to see.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Link related packages, workflows, or datasets if helpful.
    validations:
      required: false
