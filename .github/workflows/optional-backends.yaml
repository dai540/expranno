name: optional-backend-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::BiocManager
            any::remotes
            any::roxygen2
            any::testthat

      - name: Install optional backends
        shell: Rscript {0}
        env:
          GITHUB_PAT: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          options(repos = BiocManager::repositories())
          BiocManager::install(
            c(
              "AnnotationDbi",
              "AnnotationFilter",
              "annotate",
              "Biobase",
              "BiocParallel",
              "biomaRt",
              "ensembldb",
              "EnsDb.Hsapiens.v86",
              "EnsDb.Mmusculus.v79",
              "genefilter",
              "GSVA",
              "preprocessCore",
              "quantiseqr",
              "SummarizedExperiment",
              "S4Vectors",
              "sva",
              "org.Hs.eg.db",
              "org.Mm.eg.db"
            ),
            ask = FALSE,
            update = FALSE
          )
          install_github_optional <- function(repo) {
            tryCatch(
              remotes::install_github(repo, upgrade = "never"),
              error = function(e) {
                message(sprintf("Skipping optional GitHub backend %s: %s", repo, conditionMessage(e)))
              }
            )
          }
          install_github_optional("dviraran/xCell")
          install_github_optional("GfellerLab/EPIC")
          install_github_optional("grst/MCPcounter")
          install_github_optional("grst/mMCPcounter")
          install_github_optional("cansysbio/ConsensusTME")
          if (!requireNamespace("immunedeconv", quietly = TRUE)) {
            tryCatch(
              remotes::install_github(
                "omnideconv/immunedeconv",
                upgrade = "never",
                dependencies = FALSE
              ),
              error = function(e) {
                message(sprintf("Skipping immunedeconv installation: %s", conditionMessage(e)))
              }
            )
          }

      - name: Document
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Run tests
        run: testthat::test_local()
        shell: Rscript {0}

      - name: Install expranno
        run: remotes::install_local(".", upgrade = "never", dependencies = FALSE)
        shell: Rscript {0}

      - name: Optional backend smoke runner
        run: source(system.file("scripts", "run_smoke_optional_backends.R", package = "expranno"))
        shell: Rscript {0}
