name: optional-backend-smoke

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::BiocManager
            any::remotes
            any::roxygen2
            any::testthat

      - name: Install optional backends
        shell: Rscript {0}
        env:
          GITHUB_PAT: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          BiocManager::install(
            c(
              "AnnotationDbi",
              "AnnotationFilter",
              "biomaRt",
              "ensembldb",
              "EnsDb.Hsapiens.v86",
              "EnsDb.Mmusculus.v79",
              "GSVA",
              "SummarizedExperiment",
              "S4Vectors",
              "org.Hs.eg.db",
              "org.Mm.eg.db"
            ),
            ask = FALSE,
            update = FALSE
          )
          if (!requireNamespace("immunedeconv", quietly = TRUE)) {
            remotes::install_github(
              "omnideconv/immunedeconv",
              upgrade = "never",
              dependencies = TRUE
            )
          }

      - name: Document
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Run tests
        run: testthat::test_local()
        shell: Rscript {0}

      - name: Optional backend smoke runner
        run: source("inst/scripts/run_smoke_optional_backends.R")
        shell: Rscript {0}
