name: optional-backend-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::BiocManager
            any::remotes
            any::roxygen2
            any::testthat

      - name: Install optional backends
        shell: Rscript {0}
        env:
          GITHUB_PAT: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          source("inst/scripts/install_optional_backends.R")
          expranno_install_optional_backends(allow_failures = TRUE)

      - name: Document
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Run tests
        run: testthat::test_local()
        shell: Rscript {0}

      - name: Install expranno
        run: remotes::install_local(".", upgrade = "never", dependencies = FALSE)
        shell: Rscript {0}

      - name: Optional backend smoke runner
        run: source(system.file("scripts", "run_smoke_optional_backends.R", package = "expranno"))
        shell: Rscript {0}
