name: pkgdown

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  pkgdown:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'
          extra-packages: |
            any::pkgdown
            any::roxygen2
            any::knitr
            any::rmarkdown

      - name: Document
        run: roxygen2::roxygenise()
        shell: Rscript {0}

      - name: Build site
        run: |
          pkg <- "."
          pkgdown::build_home(pkg)
          pkgdown::build_reference(pkg)
          for (nm in c(
            "getting-started",
            "preset-reference",
            "benchmarking-and-reproducibility",
            "theory-and-design",
            "case-study-human-rnaseq",
            "case-study-mouse-rnaseq"
          )) {
            pkgdown:::build_article(
              nm,
              pkg = pkg,
              new_process = FALSE,
              quiet = FALSE
            )
          }
          pkgdown:::build_articles_index(pkg)
          stale_md <- list.files("docs", pattern = "\\.md$", recursive = TRUE, full.names = TRUE)
          if (length(stale_md) > 0) {
            unlink(stale_md)
          }
          if (file.exists("docs/PULL_REQUEST_TEMPLATE.html")) {
            unlink("docs/PULL_REQUEST_TEMPLATE.html")
          }
        shell: Rscript {0}

      - name: Deploy site
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
